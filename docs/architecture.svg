<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 250" role="img" aria-label="sfnvizのアーキテクチャ図">
  <title>sfnvizのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: #8b949e; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: #cf7186; stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #b8455e; }
    .arrow { stroke: #8b949e; stroke-width: 1.5; fill: none; marker-end: url(#head); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect x="20" y="30" width="160" height="64" rx="8" class="box"/>
  <text x="40" y="56" class="label">ASL JSON</text>
  <text x="40" y="78" class="small">エディタで編集</text>

  <rect x="20" y="150" width="160" height="64" rx="8" class="box"/>
  <text x="40" y="176" class="label">入力とモック</text>
  <text x="40" y="198" class="small">Task結果 / $error</text>

  <rect x="250" y="30" width="150" height="64" rx="8" class="accent-box"/>
  <text x="270" y="56" class="accent-label">parseAsl</text>
  <text x="270" y="78" class="small">検証と遷移抽出</text>

  <rect x="470" y="20" width="160" height="60" rx="8" class="accent-box"/>
  <text x="490" y="46" class="accent-label">renderDiagram</text>
  <text x="490" y="66" class="small">再帰レイアウトでSVG化</text>

  <rect x="470" y="150" width="160" height="64" rx="8" class="accent-box"/>
  <text x="490" y="176" class="accent-label">simulate</text>
  <text x="490" y="198" class="small">Choice評価・Catch再現</text>

  <rect x="710" y="85" width="210" height="80" rx="8" class="box"/>
  <text x="730" y="113" class="label">UI</text>
  <text x="730" y="135" class="small">ステップ再生と状態ハイライト</text>
  <text x="730" y="151" class="small">入出力JSONの表示</text>

  <path class="arrow" d="M180 62 H242"/>
  <path class="arrow" d="M400 56 H462"/>
  <path class="arrow" d="M325 94 C340 140 420 170 462 178"/>
  <path class="arrow" d="M180 182 H462"/>
  <path class="arrow" d="M630 56 C670 66 670 95 702 105"/>
  <path class="arrow" d="M630 182 C670 172 670 145 702 138"/>
</svg>
